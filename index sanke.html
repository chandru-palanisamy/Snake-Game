<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursor Tracking Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #111; height: 100vh; cursor: none; }

    .segment {
      position: absolute;
      width: 16px;
      height: 16px;
      background: lime;
      border-radius: 50%;
      box-shadow: 0 0 10px lime;
      pointer-events: none;
    }

    .food {
      position: absolute;
      width: 10px; /* reduced size */
      height: 10px; /* reduced size */
      background: red;
      border-radius: 50%;
      box-shadow: 0 0 8px red; /* smaller glow for smaller food */
    }

    h1 {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      z-index: 10;
    }

    #score {
      position: absolute;
      top: 60px;
      left: 20px;
      color: white;
      font-size: 22px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <h1>Cursor Tracking Snake Game</h1>
  <div id="score">Score: 0</div>
  <div class="food" id="food"></div>

  <script>
    let snakeLength = 5;
    const segments = [];
    const positions = [];
    let score = 0;

    const food = document.getElementById("food");
    const scoreBox = document.getElementById("score");

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;

    let foodX = Math.random() * (window.innerWidth - 10);
    let foodY = Math.random() * (window.innerHeight - 10);

    food.style.left = foodX + "px";
    food.style.top = foodY + "px";

    function createSegment() {
      const segment = document.createElement("div");
      segment.classList.add("segment");
      document.body.appendChild(segment);
      segments.push(segment);
      positions.push({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
    }

    for (let i = 0; i < snakeLength; i++) createSegment();

    document.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function checkFoodCollision() {
      const dx = positions[0].x - foodX;
      const dy = positions[0].y - foodY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 15) { // adjusted for smaller food
        snakeLength += 3;
        score++;
        scoreBox.innerText = "Score: " + score;

        for (let i = 0; i < 3; i++) createSegment();

        foodX = Math.random() * (window.innerWidth - 10);
        foodY = Math.random() * (window.innerHeight - 10);
        food.style.left = foodX + "px";
        food.style.top = foodY + "px";
      }
    }

    function animateSnake() {
      positions[0].x += (mouseX - positions[0].x) * 0.2;
      positions[0].y += (mouseY - positions[0].y) * 0.2;

      for (let i = 1; i < snakeLength; i++) {
        positions[i].x += (positions[i - 1].x - positions[i].x) * 0.2;
        positions[i].y += (positions[i - 1].y - positions[i].y) * 0.2;
      }

      segments.forEach((segment, i) => {
        segment.style.left = positions[i].x + "px";
        segment.style.top = positions[i].y + "px";
        segment.style.transform = `scale(${1 - i * 0.02})`;
      });

      checkFoodCollision();
      requestAnimationFrame(animateSnake);
    }

    animateSnake();
  </script>
</body>
</html>
